<script>
(function(){
  function pad2(n){return n<10?'0'+n:n;}

  // 十二地支日值日规则：[地支, 生肖, 无, 破]
  const ZHI_RULES=[
    {zhi:'子',sx:'鼠',wu:'马',po:'羊'},
    {zhi:'丑',sx:'牛',wu:'羊',po:'马'},
    {zhi:'寅',sx:'虎',wu:'猴',po:'蛇'},
    {zhi:'卯',sx:'兔',wu:'鸡',po:'鼠'},
    {zhi:'辰',sx:'龙',wu:'狗',po:'兔'},
    {zhi:'巳',sx:'蛇',wu:'猪',po:'虎'},
    {zhi:'午',sx:'马',wu:'鼠',po:'牛'},
    {zhi:'未',sx:'羊',wu:'牛',po:'狗'},
    {zhi:'申',sx:'猴',wu:'虎',po:'猪'},
    {zhi:'酉',sx:'鸡',wu:'兔',po:'龙'},
    {zhi:'戌',sx:'狗',wu:'龙',po:'鸡'},
    {zhi:'亥',sx:'猪',wu:'蛇',po:'猴'}
  ];

  // 计算当天地支：以某已知甲子日为基准推算
  // 2024-01-01 = 甲子日（已知，天干地支循环60）
  // 地支12轮，以该日地支为 子(0) 基准
  const BASE_DATE = new Date(2024,0,1); // 2024-01-01

  function getDayZhiIndex(date){
    const msPerDay=86400000;
    const diff=Math.round((new Date(date.getFullYear(),date.getMonth(),date.getDate())-BASE_DATE)/msPerDay);
    return ((diff % 12) + 12) % 12;
  }

  function updateClock(){
    const now=new Date();
    const wds=['日','一','二','三','四','五','六'];

    // 时钟行
    document.getElementById('todayBar').textContent=
      now.getFullYear()+'年'+pad2(now.getMonth()+1)+'月'+pad2(now.getDate())+'日 星期'+wds[now.getDay()]+
      '  '+pad2(now.getHours())+':'+pad2(now.getMinutes())+':'+pad2(now.getSeconds());

    // 值日行
    const idx=getDayZhiIndex(now);
    const r=ZHI_RULES[idx];
    document.getElementById('zhiRiBar').textContent=
      `📅 今日值日：${r.sx}日（${r.zhi}）　无${r.wu}　破${r.po}`;
  }

  updateClock();
  setInterval(updateClock,1000);
})();
</script>

const CNY_MAP={'2021':'2021-02-12','2022':'2022-02-01','2023':'2023-01-22','2024':'2024-02-10','2025':'2025-01-29','2026':'2026-02-17'};
function tbl(d,y){
  y=y||2026;
  const offset=getOffset(d,y);
  return buildTblFromOffset(offset);
}
function n2z(n,t){for(let z in t)if(t[z].includes(n))return z;return null;}
function pad(n){return String(n).padStart(2,'0');}

function gz(d,y){
  y=y||2026;
  const[m,dd]=d.split('.').map(Number);
  // 统一基准: 2024-01-01 = 甲子日 (天干0=甲, 地支0=子)
  const base=new Date(2024,0,1);
  const dt=new Date(y,m-1,dd);
  const delta=Math.round((dt-base)/864e5);
  const ti=((delta)%10+10)%10,di=((delta)%12+12)%12;
  return{gz:TG[ti]+DZ[di],sx:SX[di]};
}

function nextDate(d,y){
  y=y||2026;
  const[m,dd]=d.split('.').map(Number);
  const dt=new Date(y,m-1,dd);
  dt.setDate(dt.getDate()+1);
  return (dt.getMonth()+1)+'.'+dt.getDate();
}
function nextDateObj(d,y){
  y=y||2026;
  const[m,dd]=d.split('.').map(Number);
  const dt=new Date(y,m-1,dd);
  dt.setDate(dt.getDate()+1);
  return {date:(dt.getMonth()+1)+'.'+dt.getDate(), year:dt.getFullYear()};
}

function stats(){const t=null; // 保留参数兼容
  const r10={},r50={};
  SX.forEach(z=>{r10[z]=0;r50[z]=0;});
  H.slice(-20).forEach(([,n])=>{const z=n2z(n,t);if(z)r10[z]++;});
  H.slice(-50).forEach(([,n])=>{const z=n2z(n,t);if(z)r50[z]++;});
  return{r10,r50};
}

function cmb(a,k){if(!k)return[[]];if(a.length<k)return[];const[f,...r]=a;return[...cmb(r,k-1).map(c=>[f,...c]),...cmb(r,k)];}
function cf(g){for(let i=0;i<g.length;i++)for(let j=i+1;j<g.length;j++)if(CL[g[i]]&&CL[g[i]].includes(g[j]))return false;return true;}
function best(fn,n=1){
  let b=[];
  for(let c of cmb(SX,5)){if(!cf(c))continue;b.push({g:c,s:c.reduce((a,z)=>a+fn(z),0)});}
  b.sort((a,b)=>b.s-a.s);return b.slice(0,n);
}

// 核心预测函数：给定预测日期、上期生肖、前6个号码，生成预测结果
// nums: [n1,n2,n3,n4,n5,n6] 前6个正码（可选，用于4头7尾分析）
// precomputed4Head7Tail: {head4Info, tail7Info, intersectInfo} 预计算的4头7尾分析（可选）
function doPredict(predDate, predYear, az, nums, precomputed4Head7Tail){
  const pt=tbl(predDate,predYear);
  const{r10,r50}=stats();

  const{gz:pgz,sx:psz}=gz(predDate,predYear);
  const dayE=DB[psz]; // 旧日破（保留参考）
  const clW=CL[az]||[]; // 旧互斥（保留参考）

  // --- 智能排除 v2（近N期+星期+月份+地支日） ---
  const recentZ=[...new Set(H.slice(-2).map(e=>e[2]))]; // 近2期已出生肖
  const hotZ=SX.filter(sx=>{const cnt=H.slice(-6).filter(h=>h[2]===sx).length;return cnt>=3;}); // 近6期>=3次热号
  const pd=new Date(predYear, parseInt(predDate.split('.')[0])-1, parseInt(predDate.split('.')[1]));
  const dow=pd.getDay(); // 星期几 0=日
  const mon=parseInt(predDate.split('.')[0]); // 月份
  const wkEx=WK_EX[dow]||[]; // 星期排除
  const moEx=MO_EX[mon]||[]; // 月份排除
  const dzEx=DZ_EX[psz]||[]; // 地支日排除

  // 合并所有排除（去重）
  const excludeSet=new Set([...recentZ,...hotZ,...wkEx,...moEx,...dzEx]);
  const isExcluded=z=>excludeSet.has(z);
  const excludeList=[...excludeSet];
  // 排除原因标签
  const exReason=z=>{
    const r=[];
    if(recentZ.includes(z))r.push('近2期');
    if(hotZ.includes(z))r.push('热号');
    if(wkEx.includes(z))r.push('星期');
    if(moEx.includes(z))r.push('月份');
    if(dzEx.includes(z))r.push('地支日');
    return r.join('+');
  };

  // --- 4头7尾分析 ---
  let head4Info=null, tail7Info=null, intersectInfo=null;
  
  // 优先使用传入的预计算数据（自动分析模式）
  if(precomputed4Head7Tail){
    head4Info=precomputed4Head7Tail.head4Info;
    tail7Info=precomputed4Head7Tail.tail7Info;
    intersectInfo=precomputed4Head7Tail.intersectInfo;
  }else if(nums && nums.length>=4){
    // 计算前4个号码的"头"（十位数字）
    const heads=nums.slice(0,4).map(n=>Math.floor(n/10));
    const headSum=heads.reduce((a,b)=>a+b,0);
    const head4Tails=HEAD4_TAIL7[headSum]||[];
    
    // 计算上期特码尾数推荐的7尾
    const lastTail=H.length>0?(H[H.length-1][1]%10):0;
    const lastTail7=LAST_TAIL7[lastTail]||[];
    
    // 合并两个7尾推荐（取并集）
    const combinedTails=[...new Set([...head4Tails,...lastTail7])];
    
    // 根据尾数筛选号码表中的号码，再映射到生肖
    const tailZodiacs=new Set();
    combinedTails.forEach(tail=>{
      // 找出所有尾数匹配的号码
      for(let n=1;n<=49;n++){
        if(n%10===tail){
          const z=n2z(n,pt);
          if(z)tailZodiacs.add(z);
        }
      }
    });
    
    head4Info={heads,headSum,head4Tails,headSumHit:(HEAD4_TAIL7[headSum]?((HEAD4_TAIL7[headSum].length/7)*100).toFixed(1):0)};
    tail7Info={lastTail,lastTail7};
    intersectInfo={combinedTails,tailZodiacs:[...tailZodiacs]};
  }

  const HC={'猴':70,'鼠':72,'龙':69,'马':51,'虎':66,'羊':69,'牛':57,'狗':47,'蛇':58,'猪':46,'鸡':56,'兔':58};
  const hM=Math.max(...Object.values(HC));
  const f5=Math.max(...Object.values(r50),1);
  const f1=Math.max(...Object.values(r10),1);

  const sb=(z,w)=>{if(isExcluded(z))return -999; w=w||{a:.3,b:.35,c:.35};return w.a*(HC[z]/hM)+w.b*(r50[z]/f5)+w.c*(r10[z]/f1);};
  const sv=z=>sb(z);
  const sp=z=>sb(z);
  const sc=z=>{if(isExcluded(z))return -999; return .3*(1-HC[z]/hM)+.35*(1-r50[z]/f5)+.35*(1-r10[z]/f1);};
  const st=z=>sb(z,{a:.1,b:.3,c:.6});

  const s1=best(sv),s2=best(sp),s3=best(sc),s4=best(st),s5=best(sp);
  const strats=[
    {n:'🔥 强势综合组',g:s1[0].g,d:'智能排除v2(近2期/星期/月份/地支日)'},
    {n:'💎 纯信号组',g:s2[0].g,d:'智能排除+纯信号'},
    {n:'❄️ 冷门回补组',g:s3[0].g,d:'超冷反弹'},
    {n:'📈 短期趋势组',g:s4[0].g,d:'近期动能'},
    {n:'🛡️ 保底防御组',g:s5[0].g,d:'纯信号排名'},
  ];

  const cm={},as=new Set();
  strats.forEach(s=>s.g.forEach(z=>{cm[z]=(cm[z]||0)+1;as.add(z);}));
  prevSel=[...as];
  const ns=SX.filter(z=>!as.has(z));
  const ic=SX.filter(z=>r10[z]===0);

  // 全排名（根据4头7尾交集过滤）
  let zt;
  if(intersectInfo && intersectInfo.tailZodiacs && intersectInfo.tailZodiacs.length>0){
    const allowedZodiacs=new Set(intersectInfo.tailZodiacs);
    zt=SX.filter(z=>allowedZodiacs.has(z)).map(z=>{
      let t='';
      if(isExcluded(z))t+=' '+exReason(z);
      const v1=sv(z), v2=sp(z);
      return`<tr><td>${E[z]}${z}</td><td>${v1<0?'<span style="color:#ff4444">排除</span>':v1.toFixed(3)}</td><td>${v2<0?'<span style="color:#ff4444">排除</span>':v2.toFixed(3)}</td><td>${HC[z]}</td><td>${r50[z]}</td><td>${r10[z]}</td><td style="color:#888;font-size:.72em">${t}</td></tr>`;
    }).join('');
  }else{
    zt=SX.map(z=>{
      let t='';
      if(isExcluded(z))t+=' '+exReason(z);
      const v1=sv(z), v2=sp(z);
      return`<tr><td>${E[z]}${z}</td><td>${v1<0?'<span style="color:#ff4444">排除</span>':v1.toFixed(3)}</td><td>${v2<0?'<span style="color:#ff4444">排除</span>':v2.toFixed(3)}</td><td>${HC[z]}</td><td>${r50[z]}</td><td>${r10[z]}</td><td style="color:#888;font-size:.72em">${t}</td></tr>`;
    }).join('');
  }

  // 策略（根据4头7尾交集过滤）
  const stH=strats.map(s=>{
    let filteredG=s.g;
    if(intersectInfo && intersectInfo.tailZodiacs && intersectInfo.tailZodiacs.length>0){
      const allowedZodiacs=new Set(intersectInfo.tailZodiacs);
      filteredG=s.g.filter(z=>allowedZodiacs.has(z));
    }
    const w=[];
    filteredG.filter(z=>isExcluded(z)).forEach(z=>w.push(exReason(z)+':'+E[z]));
    return`<div class="si"><div class="sn">${s.n}</div><div class="sg">${filteredG.map(z=>E[z]+z).join(' ')}</div>${w.length?`<div class="sw">${w.join(' | ')}</div>`:''}</div>`;
  }).join('');

  // 共识（根据4头7尾交集过滤）
  let cs=Object.entries(cm).sort((a,b)=>b[1]-a[1]);
  
  // 如果有4头7尾交集数据，过滤只保留交集内的生肖
  if(intersectInfo && intersectInfo.tailZodiacs && intersectInfo.tailZodiacs.length>0){
    const allowedZodiacs=new Set(intersectInfo.tailZodiacs);
    cs=cs.filter(([z])=>allowedZodiacs.has(z));
  }
  
  const cH=cs.map(([z,c])=>{
    const bc=c>=4?'bg':c>=3?'bs':'bb';
    let r='',rk=[];
    if(!isExcluded(z))r='<span class="rf">零风险 ✅</span>';
    else{rk.push(exReason(z));r=`<span class="rw">${rk.join('+')} ⚠️</span>`;}
    
    // 号码显示：根据4头7尾推荐尾数标记
    let numsHtml;
    if(intersectInfo && intersectInfo.combinedTails && intersectInfo.combinedTails.length>0){
      const allowedTails=new Set(intersectInfo.combinedTails);
      numsHtml=(pt[z]||[]).map(n=>{
        const tail=n%10;
        const padded=pad(n);
        if(allowedTails.has(tail)){
          return padded; // 符合推荐尾数，正常显示
        }else{
          return `<span style="color:#ff4444;text-decoration:line-through;opacity:.6">${padded}</span>`; // 不符合，红色横杠
        }

    }else{
      numsHtml=(pt[z]||[]).map(pad).join('、');
    }
    
    return`<tr><td><span class="badge ${bc}">${c}/5</span></td><td>${E[z]} ${z}</td><td style="font-size:.8em">${numsHtml}</td><td>${r}</td></tr>`;
  }).join('');

  // 看点
  const top=cs[0]||['',0];
  const rf=cs.filter(([z])=>!isExcluded(z));
  const h1=`${E[top[0]]}${top[0]} ${top[1]}/5${top[1]>=4?' 🏆':''}`;
  const h2=rf.length?rf.map(([z])=>E[z]+z).join(' '):'无';
  
  // 未入选（根据4头7尾交集过滤）
  let filteredNs=ns;
  if(intersectInfo && intersectInfo.tailZodiacs && intersectInfo.tailZodiacs.length>0){
    const allowedZodiacs=new Set(intersectInfo.tailZodiacs);
    filteredNs=ns.filter(z=>allowedZodiacs.has(z));
  }
  const h3=filteredNs.length?`未入选: ${filteredNs.map(z=>E[z]+z).join('、')}`:'全覆盖！';
  
  // 极冷（根据4头7尾交集过滤）
  let filteredIc=ic;
  if(intersectInfo && intersectInfo.tailZodiacs && intersectInfo.tailZodiacs.length>0){
    const allowedZodiacs=new Set(intersectInfo.tailZodiacs);
    filteredIc=ic.filter(z=>allowedZodiacs.has(z));
  }
  const h4=filteredIc.length?filteredIc.map(z=>E[z]+z).join('、')+' 近20期0次':'无';

  const hh=H.slice(-12).map(([d,n,z,yr],i)=>{
    const idx=H.length-12+i;
    const isUser=idx>=INIT_LEN;
    const y=yr||2026;
    const label=parseInt(d.split('.')[0])+'/'+parseInt(d.split('.')[1]);
    return isUser?`<span onclick="editEntry(${idx})" title="${y}年${parseInt(d.split('.')[0])}月${parseInt(d.split('.')[1])}日">${label} <b>${pad(n)}</b> ${E[z]}</span>`:`<span title="${y}年${parseInt(d.split('.')[0])}月${parseInt(d.split('.')[1])}日">${label} ${pad(n)} ${E[z]}</span>`;
  }).join('');

  const wkNames=['周日','周一','周二','周三','周四','周五','周六'];
  const recentEx=recentZ.map(z=>E[z]+z).join(' ')||'无';
  const hotEx=hotZ.map(z=>E[z]+z).join(' ')||'无';
  const wkExS=wkEx.map(z=>E[z]+z).join(' ')||'无';
  const moExS=moEx.map(z=>E[z]+z).join(' ')||'无';
  const dzExS=dzEx.map(z=>E[z]+z).join(' ')||'无';
  const exCount=excludeList.length;

  // 返回HTML片段（不含顶部复盘条）
  return {strats, stats: {exCount, predDate, predYear, pgz, psz, az, pt, recentEx, hotEx, wkExS, moExS, dzExS, wkNames, dow, mon, ic, stH, cH, zt, h1, h2, h3, h4, hh, as, ns, head4Info, tail7Info, intersectInfo}};
}

// 日期格式化：M.D + year → "2026年4月1日"
function fmtDate(md, year){
  const p=md.split('.');
  return year+'年'+parseInt(p[0])+'月'+parseInt(p[1])+'日';
}

// 根据选择的预测日期，从历史查找开奖号，录入并预测下期
function goByDate(){
  const dateInput=document.getElementById('predDateInput').value;
  if(!dateInput){alert('请先选择预测日期');return;}
  const parts=dateInput.split('-');
  const md=parseInt(parts[1])+'.'+parseInt(parts[2]);
  const year=parseInt(parts[0]);

  // 在历史数据中查找该日期的条目
  const entry=H.find(h=>{
    const hy=h.length>=4?h[3]:2026;
    return h[0]===md && hy===year;
  });

  if(!entry){
    alert(`${year}年${parseInt(parts[1])}月${parseInt(parts[2])}日 没有开奖记录`);
    return;
  }

  const num=entry[1];
  const az=entry[2];

  // 复盘
  const hit=prevSel.includes(az);
  if(hit)streak++;else streak=0;

  // 录入历史
  H.push([md, num, az, year]);

  // 预测下一期
  const nextObj=nextDateObj(md, year);
  const data=doPredict(nextObj.date, nextObj.year, az);
  const reviewHtml=`
<div class="streak">${hit?'🎉 连续'+streak+'期命中！':'💔 连胜中断'}</div>
<div class="review">
  📅 ${fmtDate(md, year)} 开奖: <b>${pad(num)} → ${E[az]}${az}</b>
  ${hit?'<span class="hit">✅ 命中！</span>':'<span class="miss">❌ 未覆盖</span>'}
  &nbsp;|&nbsp; 预测: <b>${fmtDate(nextObj.date, nextObj.year)} ${data.stats.pgz}${data.stats.psz}日</b>
</div>`;

  renderPredict(data, reviewHtml);
  document.getElementById('num').value='';
  document.getElementById('predDateInput').value='';
  updateInfo();
  saveData();
}

// 输入开奖号码 → 录入 + 可选预测日期
function go(){
  const dateInput=document.getElementById('predDateInput').value;
  const numVal=document.getElementById('num').value.trim();

  // 选了日期但没输入号码 → 自动查历史
  if(dateInput && !numVal){
    goByDate();
    return;
  }

  // 解析7个号码（前6个正码+第7个特码）
  let nums=[];
  if(numVal.includes(',')||numVal.includes(' ')||numVal.includes('，')){
    // 多号码模式
    nums=numVal.split(/[,，\s]+/).map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>=1&&n<=49);
  }else{
    // 单个号码模式（兼容旧版）
    const n=parseInt(numVal);
    if(n>=1&&n<=49)nums=[n];
  }

  if(nums.length===0){alert('请输入01-49的号码');return;}

  // 取最后一个作为特码，前面的作为正码
  const num=nums[nums.length-1];
  const normalNums=nums.length>=7?nums.slice(0,6):[]; // 如果有7个号码，取前6个作为正码

  const lastEntry=H[H.length-1];
  const lastYear=lastEntry.length>=4?lastEntry[3]:2026;
  const curObj=nextDateObj(lastEntry[0],lastYear);
  const curDate=curObj.date, curYear=curObj.year;
  const defaultPred=nextDateObj(curDate,curYear);

  // 读取用户选择的预测日期（goByDate已处理无号码情况，这里是手动输入号码的流程）
  const pDI=document.getElementById('predDateInput').value;
  let predDate, predYear;
  if(pDI){
    const parts=pDI.split('-');
    predDate=parseInt(parts[1])+'.'+parseInt(parts[2]);
    predYear=parseInt(parts[0]);
  }else{
    predDate=defaultPred.date;
    predYear=defaultPred.year;
  }

  const ct=tbl(curDate,curYear), pt=tbl(predDate,predYear);
  const az=n2z(num,ct);
  if(!az){alert('号码无效');return;}

  // 复盘
  const hit=prevSel.includes(az);
  if(hit)streak++;else streak=0;

  // 更新历史（带年份）
  H.push([curDate,num,az,curYear]);

  const data=doPredict(predDate, predYear, az, normalNums);
  const reviewHtml=`
<div class="streak">${hit?'🎉 连续'+streak+'期命中！':'💔 连胜中断'}</div>
<div class="review">
  📅 ${fmtDate(curDate, curYear)} 开奖: <b>${pad(num)} → ${E[az]}${az}</b>
  ${hit?'<span class="hit">✅ 命中！</span>':'<span class="miss">❌ 未覆盖</span>'}
  &nbsp;|&nbsp; 预测: <b>${fmtDate(predDate, predYear)} ${data.stats.pgz}${data.stats.psz}日</b>
</div>`;

  renderPredict(data, reviewHtml);
  document.getElementById('num').value='';
  document.getElementById('predDateInput').value='';
  updateInfo();
  saveData();
}

// 自动分析4头推荐：基于历史数据统计高概率的"头"
function autoAnalyze4Head(){
  // 统计近50期每个"头"（十位数字）的出现频率
  const recentH=H.slice(-50);
  const headCount={0:0,1:0,2:0,3:0,4:0};
  
  recentH.forEach(([d,n,z])=>{
    const head=Math.floor(n/10);
    if(head>=0&&head<=4)headCount[head]++;
  });
  
  // 找出出现频率最高的"头"
  let maxHead=0,maxCount=0;
  for(let h=0;h<=4;h++){
    if(headCount[h]>maxCount){
      maxCount=headCount[h];
      maxHead=h;
    }
  }
  
  // 根据高频头推荐7尾（使用HEAD4_TAIL7表中对应的数据）
  // 头0->和约2-5, 头1->和约6-9, 头2->和约10-13, 头3->和约14-17, 头4->和约18+
  const headSumMap={0:3,1:7,2:11,3:14,4:15};
  const recommendedSum=headSumMap[maxHead]||10;
  
  return HEAD4_TAIL7[recommendedSum]||HEAD4_TAIL7[10];
}

const KJ_URL='https://axavdfvfb.poodco.com:22447/kj/his/am.html';

async function fetchFromSite(){
  // 用 no-cors 模式可以发请求但拿不到内容；需要用CORS代理或直接请求
  // 先尝试直接 fetch（如果网站允许跨域）
  const res=await fetch(KJ_URL,{signal:AbortSignal.timeout(20000)});
  const html=await res.text();

}

function parseKJHtml(text){
  // 解析文字：格式 "089期(开奖时间:2026-03-30)"
  const lines=text.replace(/<[^>]+>/g,' ').split(/\s+/).map(s=>s.trim()).filter(Boolean);
  for(let i=0;i<lines.length;i++){
    const m=lines[i].match(/^(\d{3,4})期\(开奖时间:(\d{4}-\d{2}-\d{2})\)$/);
    if(m){
      const nums=[];
      for(let j=i+1;j<lines.length&&nums.length<7;j++){
        if(/^\d{1,2}$/.test(lines[j]))nums.push(parseInt(lines[j]));
      }
      if(nums.length===7){
        const specialNum=nums[6];
        const dateStr=m[2];
        const mo=dateStr.match(/\d{4}-(\d{2})-(\d{2})/);
        const dateShort=mo?`${parseInt(mo[1])}.${parseInt(mo[2])}`:dateStr;
        const y=parseInt(dateStr.slice(0,4));
        const zodiac=n2z(specialNum,tbl(dateShort,y))||'?';
        return{success:true,period:m[1],date:dateStr,dateShort,specialNum,zodiac};
      }
    }
  }
  return{success:false,error:'未找到开奖记录'};
}

const INIT_LEN=H.length; // 初始历史长度，之前的不可编辑

// 批量补全缺失记录（核心逻辑，供autoFetch和autoFetchSilent共用）
// records: [{dateShort, specialNum, zodiac, date}, ...]（按网站顺序，最新在前）
// 返回新增条数
function batchImport(records){
  if(!records||!records.length) return 0;
  // 网站返回的是最新在前，我们需要从旧到新追加，先反转
  const sorted=[...records].reverse();
  let added=0;
  for(const r of sorted){
    // 只处理日期格式合法的（必须是 M.D 或 M.DD 格式，如 3.31）
    if(!/^\d{1,2}\.\d{1,2}$/.test(r.dateShort)){
      console.log('跳过非法日期格式:', r.dateShort);
      continue;
    }
    // 规范化日期格式：确保日期部分是1-2位数字（如 3.31 而不是 3.1）
    const [m,d]=r.dateShort.split('.').map(Number);
    const normalizedDate=`${m}.${d}`; // 去除前导零，但保留实际值
    
    // 已有就跳过（检查原始日期和规范化后的日期）
    if(H.some(h=>h[0]===r.dateShort||h[0]===normalizedDate)){
      console.log('日期已存在:', r.dateShort);
      continue;
    }
    
    // 从日期算年份
    const y=r.date?parseInt(r.date.split('-')[0]):2026;
    H.push([normalizedDate, r.specialNum, r.zodiac, y]);
    console.log('添加新记录:', normalizedDate, r.specialNum, r.zodiac, y);
    added++;
  }
  if(added>0){ saveData(); }
  return added;
}

// 自动获取最新开奖号（手动点按钮）—— 批量补全所有缺失
async function autoFetch(){
  const btn=document.querySelector('button.auto')||event.target;
  const origText=btn.textContent;
  btn.textContent='⏳ 获取中...';
  btn.disabled=true;
  const info=document.getElementById('nextInfo');
  
  try{
    // 先尝试直连网站（all = 尽量多抓）
    let data;
    try{
      data=await fetchFromSite();
    }catch(e){
      data=null;
    }

    btn.textContent=origText;
    btn.disabled=false;

    // 直连失败，降级走本地服务（count=all）
    if(!data||!data.success){
      info.textContent='⏳ 正在通过本地服务批量获取...';
      await autoFetchViaServer();
      return;
    }

    // 直连只能拿到1条（fetchFromSite限制），降级走本地服务补全更多
    info.textContent='⏳ 正在通过本地服务批量获取...';
    await autoFetchViaServer();

  }catch(e){
    btn.textContent=origText;
    btn.disabled=false;
    info.textContent='⏳ 正在通过本地服务批量获取...';
    await autoFetchViaServer();
  }
}

// 修改历史条目
function editEntry(idx){
  const entry=H[idx];
  if(!entry||idx<INIT_LEN)return;

  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal';

function doEdit(idx){
  const newNum=parseInt(document.getElementById('editNum').value);
  if(!newNum||newNum<1||newNum>49){alert('01-49');return;}
  const ey=H[idx].length>=4?H[idx][3]:2026;
  const ct=tbl(H[idx][0],ey);
  const newZ=n2z(newNum,ct);
  if(!newZ){alert('号码无效');return;}
  H[idx]=[H[idx][0],newNum,newZ,ey];
  closeModal();
  // 重算后续所有生肖
  for(let i=idx+1;i<H.length;i++){
    const iy=H[i].length>=4?H[i][3]:2026;
    const t=tbl(H[i][0],iy);
    H[i][2]=n2z(H[i][1],t)||H[i][2];
  }
  saveData();
  updateInfo();
  document.getElementById('R').innerHTML='<div style="text-align:center;color:#4ecdc4;padding:40px;font-size:1.1em">✅ 已修改 '+H[idx][0]+' 为 '+pad(newNum)+' → '+E[newZ]+newZ+'<br><br><span style="color:#888;font-size:.85em">请重新点击预测</span></div>';
}

function closeModal(){const m=document.getElementById('modal');if(m)m.remove();}

// ============ 日期跳转验证 ============
let jumpSelectedDate=null;

// 从历史条目中提取年份（条目格式支持 "2026/3.30" 或纯 "3.30"，年份默认2026）
function getYear(entry){const y=entry&&entry.length>=4?parseInt(entry[3]):2026;return(y&&y>=2021&&y<=2030)?y:2026;}

function openJump(){
  closeModal();
  // 确保历史数据有年份字段（兼容旧格式）
  H.forEach(h=>{if(h.length<4)h.push(2026);});
  const bg=document.createElement('div');bg.className='modal-bg';bg.id='modal';

  // 收集年份列表
  const years=[...new Set(H.map(h=>getYear(h)))].filter(y=>y&&!isNaN(y)).sort((a,b)=>a-b);
  if(years.length===0){alert('历史数据为空，请先输入开奖记录');return;}
  const yOpts=years.map(y=>`<option value="${y}">${y}年</option>`).join('');

  // 收集月份列表（全量）
  const months=[...new Set(H.map(h=>h[0].split('.')[0]))].map(Number).sort((a,b)=>a-b);
  const mOpts=months.map(m=>`<option value="${m}">${m}月</option>`).join('');

  bg.innerHTML=`<div class="jump-modal">
    <h3>📅 跳转到某一期验证</h3>
    <div class="jump-filter">
      <select id="jYear" onchange="onYearChange()">${yOpts}</select>
      <select id="jMonth" onchange="renderJumpList()"><option value="">全部月份</option>${mOpts}</select>
    </div>
    <div class="jump-list" id="jList"></div>
    <div class="jump-sel-info" id="jInfo">← 点击日期选择要跳转的期</div>
    <div class="modal-btns">
      <button class="ok" onclick="doJump()">⚡ 跳转预测</button>
      <button class="cancel" onclick="closeModal()">取消</button>
    </div>
  </div>`;
  document.body.appendChild(bg);

  // 默认选最新年份
  const latestYear=years[years.length-1];
  document.getElementById('jYear').value=latestYear;
  jumpSelectedDate=null;
  onYearChange(); // 刷新月份并渲染列表
  bg.addEventListener('click',e=>{if(e.target===bg)closeModal();});
}

function onYearChange(){
  const y=parseInt(document.getElementById('jYear').value);
  // 重建月份列表（只显示该年有数据的月份）
  const months=[...new Set(H.filter(h=>getYear(h)===y).map(h=>h[0].split('.')[0]))].map(Number).sort((a,b)=>a-b);
  const mOpts=`<option value="">全部月份</option>`+months.map(m=>`<option value="${m}">${m}月</option>`).join('');
  document.getElementById('jMonth').innerHTML=mOpts;
  jumpSelectedDate=null;
  renderJumpList();
}

function renderJumpList(){
  const y=parseInt(document.getElementById('jYear').value);
  const mFilter=document.getElementById('jMonth').value;
  const lastIdx=H.length-1;
  // 显示全部（包括最后一条），最后一条单独标注
  const items=H.filter((h,i)=>{
    if(getYear(h)!==y)return false;
    if(!mFilter)return true;
    return h[0].split('.')[0]===mFilter;
  });
  const html=items.map((h,_,arr)=>{
    const [d,n,z]=h;
    const y=getYear(h);
    const isLast=H.indexOf(h)===lastIdx;
    const isSel=jumpSelectedDate===d+'_'+y;
    const dLabel=parseInt(d.split('.')[0])+'/'+parseInt(d.split('.')[1]);
    return `<div class="jump-item${isSel?' selected':''}${isLast?' latest-item':''}" onclick="selectJumpDate('${d}',${y})" style="${isLast?'position:relative;border:1px solid #a78bfa44;':''}">
      ${isLast?'<span style="position:absolute;top:2px;right:2px;font-size:9px;color:#a78bfa;line-height:1">最新</span>':''}
      <div class="jdate" title="${y}年${parseInt(d.split('.')[0])}月${parseInt(d.split('.')[1])}日">${dLabel}</div>
      <div class="jnum">${pad(n)}</div>
      <div class="jsx">${E[z]}${z}</div>
    </div>`;
  }).join('');
  document.getElementById('jList').innerHTML=html||'<div style="color:#888;font-size:.85em;padding:10px;grid-column:span 4;text-align:center">暂无数据</div>';
}

function selectJumpDate(d, y){
  jumpSelectedDate=d+'_'+y;
  const entry=H.find(h=>h[0]===d&&getYear(h)===y);
  if(!entry)return;
  const nextObj=nextDateObj(d,y);
  const nextEntry=H.find(h=>h[0]===nextObj.date&&getYear(h)===nextObj.year);
  const info=document.getElementById('jInfo');
  const selLabel=fmtDate(d,y);
  if(nextEntry){
    info.innerHTML=`已选: <b>${selLabel}</b> 开奖 <b>${pad(entry[1])} ${E[entry[2]]}${entry[2]}</b><br>将用此期开奖号 → 预测 <b>${fmtDate(nextObj.date,nextObj.year)}</b>（含复盘）`;
  } else {
    info.innerHTML=`已选: <b>${selLabel}</b> 开奖 <b>${pad(entry[1])} ${E[entry[2]]}${entry[2]}</b><br>下一期 <b>${fmtDate(nextObj.date,nextObj.year)}</b> 暂无历史数据（只预测，无复盘）`;
  }
  renderJumpList();
}

function doJump(){
  if(!jumpSelectedDate){alert('请先选择一个日期');return;}
  const [d,yStr]=jumpSelectedDate.split('_');
  const y=parseInt(yStr);
  const entry=H.find(h=>h[0]===d&&getYear(h)===y);
  if(!entry){closeModal();return;}

  const idx=H.findIndex(h=>h[0]===d&&getYear(h)===y);
  const fullH=JSON.parse(JSON.stringify(H));
  const fullStreak=streak;

  H.length=0;
  fullH.slice(0,idx).forEach(x=>H.push(x));
  prevSel=[];
  streak=7;

  closeModal();

  document.getElementById('num').value=entry[1];
  const info=document.getElementById('nextInfo');
  info.innerHTML=`⏪ 回溯验证: <b style="color:#a78bfa">${fmtDate(d,y)}</b>`;

  go();

  // 恢复完整历史
  fullH.slice(idx+1).forEach(x=>H.push(x));
  streak=fullStreak;
  saveData();
  updateInfo();
}

function updateInfo(){
  const last=H[H.length-1];
  const ly=last.length>=4?last[3]:2026;
  const ndObj=nextDateObj(last[0],ly);
  document.getElementById('nextInfo').textContent=`最新: ${fmtDate(last[0],ly)} ${E[last[2]]}${last[2]} → 录入${fmtDate(ndObj.date,ndObj.year)}开奖号`;
}
